<script>
const SAVE_KEY="life-planning-game-save-v1",WEEKLY_KEY=SAVE_KEY+"-weekly-ambition-penalty-date",INITIAL_WEIGHT=156,NORMAL_WEIGHT=120,DEFAULT_PAGE_COLOR="#020617";
const skillLevels=[{name:"新手",need:100},{name:"入门",need:500},{name:"精通",need:2000},{name:"专家",need:10000}],skillDisplayOrder=["科研","外语","唱歌","Python","健身"],statLabels={weight:"体重",health:"健康值",knowledge:"知识",ambition:"进取心"};
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s)),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),round2=v=>Math.round(Number(v||0)*100)/100,toNum=(v,f=0)=>Number.isFinite(Number(v))?Number(v):f,makeId=()=>`${Date.now()}-${Math.random()}`,pad2=v=>String(v).padStart(2,"0"),todayISO=(d=new Date())=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`,monthISO=(d=new Date())=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}`,dateLabel=(d=new Date())=>`${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`,nowText=()=>new Date().toLocaleString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}),dayText=()=>new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});
function defaultState(){return{tab:"dashboard",stats:{weight:156,health:50,knowledge:15,ambition:15},skills:{科研:{levelIndex:0,exp:0},外语:{levelIndex:0,exp:0},唱歌:{levelIndex:0,exp:0},Python:{levelIndex:0,exp:0},健身:{levelIndex:0,exp:0}},paperProgress:0,paperAccepted:false,points:0,weightInput:"156",weightPointsApplied:0,weightHealthApplied:0,dailyGain:{readPaperResearch:0,readPaperAmbition:0,date:todayISO()},actionMinutes:{readBook:"60",learnLanguage:"60",learnSkill:"60"},visibleHints:{},selectedSkill:"Python",log:[{id:"init",message:"欢迎进入地球 Online：把现实行动数据化，慢慢升级。",snapshot:null,undone:false}],redeemed:[],pointHistory:[{id:"init-points",date:nowText(),reason:"初始积分",change:0,before:0,after:0}],history:[{day:1,date:todayISO(),label:dateLabel(),health:50,knowledge:15,ambition:15,weight:156}],customAction:{name:"早睡",stat:"health",statAmount:"0.02",stat2:"none",statAmount2:"0",skill:"none",skillAmount:"0.02",points:"1",unit:"time"},customActions:[],newSkillName:"",customReward:{name:"奶茶",cost:"80"},shopItems:[{name:"韩国轮船游",cost:5000},{name:"和田玉手串",cost:500},{name:"商场购物额度",cost:1000}],ledgerForm:{date:todayISO(),name:"",amount:""},ledgerMonth:monthISO(),ledger:[],pageColor:DEFAULT_PAGE_COLOR,backgroundImage:"",backgroundOpacity:"0.25",weeklyAmbitionPenaltyDate:""}}
let state=loadState();function loadState(){const s=defaultState();try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return s;const p=JSON.parse(raw);return{...s,...p,tab:"dashboard",pageColor:p.pageColor||DEFAULT_PAGE_COLOR,visibleHints:p.visibleHints||{},customAction:{...s.customAction,...(p.customAction||{})}}}catch{return s}}function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify({...state,tab:undefined}))}function setState(p){state={...state,...p};saveState();render()}function snapshot(){return JSON.parse(JSON.stringify({...state,tab:undefined}))}function restoreSnapshot(s){state={...state,...s,tab:state.tab};saveState();render()}function addSystemLog(m){state.log=[{id:makeId(),message:m,snapshot:null,undone:false},...state.log].slice(0,20)}function addLog(m,s=null){state.log=[{id:makeId(),message:m,snapshot:s,undone:false},...state.log].slice(0,20)}function changePoints(c,r){c=round2(c);const b=round2(state.points),a=round2(state.points+c);state.points=a;state.pointHistory=[{id:makeId(),date:nowText(),reason:r,change:c,before:b,after:a},...state.pointHistory].slice(0,30)}function recordHistory(ns){const n=new Date();state.history=[...state.history,{day:state.history.length+1,date:todayISO(n),label:dateLabel(n),health:round2(ns.health),knowledge:round2(ns.knowledge),ambition:round2(ns.ambition),weight:round2(ns.weight)}].slice(-14)}function addStats(d){const p=state.stats,n={weight:d.weight!==undefined?round2(p.weight+d.weight):p.weight,health:d.health!==undefined?round2(clamp(p.health+d.health,0,100)):p.health,knowledge:d.knowledge!==undefined?round2(clamp(p.knowledge+d.knowledge,0,100)):p.knowledge,ambition:d.ambition!==undefined?round2(clamp(p.ambition+d.ambition,0,100)):p.ambition};state.stats=n;recordHistory(n)}function addSkillExp(n,a){if(!n||!state.skills[n])return;const c=state.skills[n],lv=skillLevels[c.levelIndex];let li=c.levelIndex,e=round2(c.exp+a);if(e>=lv.need&&li<skillLevels.length-1){li++;e=0;addSystemLog(`${n} 升级为「${skillLevels[li].name}」，经验值已重置为 0。`)}else if(e>=lv.need){e=lv.need;addSystemLog(`${n} 已达到专家阶段经验上限。`)}state.skills[n]={levelIndex:li,exp:e}}function resetDaily(){const t=todayISO();if(state.dailyGain.date!==t)state.dailyGain={readPaperResearch:0,readPaperAmbition:0,date:t}}function weeklyPenalty(){const n=new Date();if(n.getDay()!==0)return;const t=todayISO(n),old=localStorage.getItem(WEEKLY_KEY)||state.weeklyAmbitionPenaltyDate;if(old===t)return;localStorage.setItem(WEEKLY_KEY,t);state.weeklyAmbitionPenaltyDate=t;state.stats={...state.stats,ambition:round2(clamp(state.stats.ambition-.1,0,100))};recordHistory(state.stats);addSystemLog("周日结算：进取心 -0.1。");saveState()}resetDaily();weeklyPenalty();
function weightPointTotal(w){const lost=Math.max(0,INITIAL_WEIGHT-w);let t=0,remain=lost,i=0;while(remain>0){const part=Math.min(1,remain);t+=(10+Math.floor(i/10)*5)*part;remain=round2(remain-part);i++}return round2(t)}function healthFromWeight(w){return round2(Math.max(0,INITIAL_WEIGHT-Math.max(w,NORMAL_WEIGHT))*.1)}
function statBar(l,v,m=100,s=""){const pct=m===0?0:clamp(v/m*100,0,100);return `<div class="stat"><div class="row"><span class="label">${l}</span><span class="value">${round2(v)}${s}${m===100?" / 100":""}</span></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div></div>`}function skillCard(n,sk){const lv=skillLevels[sk.levelIndex]||skillLevels[0],pct=clamp(sk.exp/lv.need*100,0,100);return `<div class="skill"><div class="row"><b>${n}</b><span class="badge">${lv.name}</span></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div class="row tiny"><span>经验 ${round2(sk.exp)}</span><span>升级 ${lv.need}</span></div></div>`}function orderedSkills(){const n=[...skillDisplayOrder.filter(x=>state.skills[x]),...Object.keys(state.skills).filter(x=>!skillDisplayOrder.includes(x))];return n.map(x=>[x,state.skills[x]])}function chartSvg(k,l){const d=state.history,w=390,h=140,p=18;if(d.length<2)return `<div class="chart tiny">数据积累后会显示曲线。</div>`;const vals=d.map(x=>Number(x[k])),mn=Math.min(...vals),mx=Math.max(...vals),rg=mx-mn||1,pts=d.map((x,i)=>`${p+i*((w-p*2)/(d.length-1))},${h-p-((Number(x[k])-mn)/rg)*(h-p*2)}`).join(" ");return `<div class="chart"><svg viewBox="0 0 ${w} ${h}" width="100%" height="100%"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${d.map((x,i)=>`<text x="${p+i*((w-p*2)/(d.length-1))}" y="${h-2}" font-size="9" text-anchor="middle" fill="#64748b">${x.label}</text>`).join("")}<text x="8" y="12" font-size="11" fill="#64748b">${l}</text></svg></div>`}function activeLedger(){return state.ledger.filter(i=>!i.undone)}
function dashboard(){return `<div class="content"><div class="card"><h2>人物属性</h2>${statBar("体重",state.stats.weight,INITIAL_WEIGHT," 斤")}${statBar("健康值",state.stats.health)}${statBar("知识",state.stats.knowledge)}${statBar("进取心",state.stats.ambition)}</div><div class="grid2">${orderedSkills().map(([n,s])=>skillCard(n,s)).join("")}</div><div class="card"><h2>属性成长曲线</h2>${chartSvg("ambition","进取心 / 健康 / 知识曲线参考")}</div><div class="card"><h2>体重曲线</h2>${chartSvg("weight","体重")}</div><div class="card"><h2>成长日志</h2><div class="log">${state.log.slice(0,8).map(i=>`<div class="logItem">${i.message}${i.snapshot&&!i.undone?`<br><button class="btn secondary" data-undo="${i.id}">撤回</button>`:""}</div>`).join("")}</div></div></div>`}
function actionRow(label,hint,id,extra=""){const cls=state.visibleHints?.[id]?"hint":"hint hidden";return `<div class="action clickable" data-hint-action="${id}"><div class="row"><b>${label}</b><button class="btn" data-action="${id}">完成</button></div>${extra}<div class="${cls}">${hint}</div></div>`}
function actions(){const opts=Object.keys(state.skills).map(n=>`<option value="${n}" ${state.selectedSkill===n?"selected":""}>${n}</option>`).join("");return `<div class="content actions-content"><div class="card"><div class="row"><div class="mini" style="flex:1"><label class="label">当前体重（斤）</label><input class="input" id="weightInput" type="number" value="${state.weightInput}"></div><button class="btn" data-action="updateWeight">更新</button></div></div><div class="card"><h2>今日行动</h2><div class="hint">读文献今日加成：科研 ${state.dailyGain.readPaperResearch}/0.1，进取心 ${state.dailyGain.readPaperAmbition}/0.1</div><div class="actions">${actionRow("读文献","科研经验 +0.01，进取心 +0.01。科研和进取心每日最多各加 0.1。积分 +1。","readLiterature")}${actionRow("写论文",`当前论文进度 ${state.paperProgress}%。每次：科研经验 +0.01，进取心 +0.01，积分 +1。完成一篇后额外获得科研经验 +1，进取心 +1。`,"writePaper")}${actionRow("读书","按分钟结算。60 分钟：知识 +0.01，积分 +1。","readBook",`<div class="mini"><label class="label">分钟</label><input class="input" id="readBookMinutes" type="number" value="${state.actionMinutes.readBook}"></div>`)}${actionRow("学外语","按分钟结算。60 分钟：外语技能经验 +0.01，积分 +1。","learnLanguage",`<div class="mini"><label class="label">分钟</label><input class="input" id="learnLanguageMinutes" type="number" value="${state.actionMinutes.learnLanguage}"></div>`)}${actionRow("学技能",`按分钟结算。60 分钟：${state.selectedSkill} 技能经验 +0.01，积分 +1。`,"learnSkill",`<div class="grid2"><div class="mini"><label class="label">技能</label><select id="selectedSkill">${opts}</select></div><div class="mini"><label class="label">分钟</label><input class="input" id="learnSkillMinutes" type="number" value="${state.actionMinutes.learnSkill}"></div></div>`)}${actionRow("轻度运动","健康 +0.02，进取心 +0.02，健身技能经验 +0.02，积分 +1。","lightWorkout")}${actionRow("中度运动","健康 +0.05，进取心 +0.05，健身技能经验 +0.05，积分 +1。","mediumWorkout")}${actionRow("唱歌","唱歌技能经验 +0.01，积分 +1。","sing")}</div></div></div>`}
function shop(){return `<div class="content"><div class="card"><div class="row"><h2>积分兑换</h2><span class="badge">${state.points} 积分</span></div><div class="actions">${[...state.shopItems].sort((a,b)=>a.cost-b.cost).map(i=>`<div class="action"><div><b>${i.name}</b><div class="label">需要 ${i.cost} 积分</div></div><button class="btn" data-redeem="${i.name}" ${state.points<i.cost?"disabled":""}>兑换</button></div>`).join("")}</div></div><div class="card"><h2>已兑换奖励</h2><div class="log">${state.redeemed.length?state.redeemed.map(i=>`<div class="logItem"><b>${i.name}</b><br>${i.date} ｜ 消耗 ${i.cost} 积分</div>`).join(""):`<div class="logItem">还没有兑换。继续行动积累积分。</div>`}</div></div><div class="card"><h2>积分变化过程</h2><div class="log">${state.pointHistory.map(i=>`<div class="logItem"><div class="row"><b>${i.reason}</b><span class="${i.change>=0?'green':'red'}">${i.change>=0?'+':''}${i.change}</span></div>${i.date} ｜ ${i.before} → ${i.after}</div>`).join("")}</div></div></div>`}
function ledger(){const t=todayISO(),act=activeLedger(),today=round2(act.filter(i=>i.date===t).reduce((s,i)=>s+i.amount,0)),month=round2(act.filter(i=>i.date.startsWith(state.ledgerMonth)).reduce((s,i)=>s+i.amount,0)),items=state.ledger.filter(i=>i.date.startsWith(state.ledgerMonth)),[y,m]=state.ledgerMonth.split("-").map(Number),first=new Date(y,m-1,1),daysIn=new Date(y,m,0).getDate(),blank=first.getDay(),map={};act.forEach(i=>{if(i.date.startsWith(state.ledgerMonth)){const d=Number(i.date.slice(8,10));map[d]=round2((map[d]||0)+i.amount)}});const days=[...Array(blank).fill(null),...Array.from({length:daysIn},(_,i)=>i+1)];return `<div class="content"><div class="card"><div class="row"><h2>记账</h2><input class="input" style="width:135px" type="month" id="ledgerMonth" value="${state.ledgerMonth}"></div><div class="grid3"><input class="input" type="date" id="ledgerDate" value="${state.ledgerForm.date}"><input class="input" id="ledgerName" placeholder="项目" value="${state.ledgerForm.name}"><input class="input" type="number" id="ledgerAmount" placeholder="金额" value="${state.ledgerForm.amount}"></div><br><button class="btn" style="width:100%" data-action="addLedger">添加记账</button><div class="grid2" style="margin-top:10px"><div class="skill"><span class="label">本日花费</span><h2>${today} 元</h2></div><div class="skill"><span class="label">本月花费</span><h2>${month} 元</h2></div></div></div><div class="card"><h2>日历花费</h2><div class="grid2" style="grid-template-columns:repeat(7,1fr);font-size:11px;text-align:center;color:#64748b">${["日","一","二","三","四","五","六"].map(d=>`<div>${d}</div>`).join("")}</div><div class="grid2" style="grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px">${days.map(d=>d?`<div class="spend-day"><b>${d}</b>${map[d]?`<div class="red">${map[d]}</div>`:""}</div>`:`<div></div>`).join("")}</div></div><div class="card"><h2>本月明细</h2><div class="log">${items.length?items.map(i=>`<div class="logItem ${i.undone?'label':''}"><div class="row"><div><b>${i.name}</b><br>${i.date} ｜ ${i.amount} 元 ${i.undone?'｜ 已撤销':''}</div>${!i.undone?`<button class="btn secondary" data-undo-ledger="${i.id}">撤销</button>`:""}</div></div>`).join(""):`<div class="logItem">本月还没有记账。</div>`}</div></div></div>`}
function customActionStats(a){if(Array.isArray(a.stats))return a.stats.filter(x=>x&&x.stat&&x.stat!=="none");const arr=[];if(a.stat&&a.stat!=="none")arr.push({stat:a.stat,amount:toNum(a.statAmount)});if(a.stat2&&a.stat2!=="none")arr.push({stat:a.stat2,amount:toNum(a.statAmount2)});return arr}
function statsText(a){const stats=customActionStats(a),unit=a.unit==="hour"?"/小时":"";return stats.map(x=>`${statLabels[x.stat]} ${toNum(x.amount)>=0?"+":""}${round2(x.amount)}${unit}`).join("，")}
function custom(){const skillOptions=Object.keys(state.skills).map(n=>`<option value="${n}">${n}</option>`).join(""),statOptions=`<option value="none">不影响属性</option><option value="health">健康值</option><option value="knowledge">知识</option><option value="ambition">进取心</option><option value="weight">体重</option>`,selectStat=(id,val)=>`<select id="${id}">${statOptions.replace(`value="${val||"none"}"`,`value="${val||"none"}" selected`)}</select>`;return `<div class="content"><div class="card"><h2>自定义技能</h2><div class="mini"><label class="label">技能名称</label><input class="input" id="newSkillName" value="${state.newSkillName}" placeholder="例如：统计学"></div><br><button class="btn" style="width:100%" data-action="addSkill">添加技能</button></div><div class="card"><h2>自定义行动</h2><div class="mini"><label class="label">行动名称</label><input class="input" id="customActionName" value="${state.customAction.name}"></div><div class="grid2" style="margin-top:8px"><div class="mini"><label class="label">结算方式</label><select id="customUnit"><option value="time" ${state.customAction.unit==="time"?"selected":""}>按次</option><option value="hour" ${state.customAction.unit==="hour"?"selected":""}>按小时</option></select></div><div class="mini"><label class="label">影响属性 1</label>${selectStat("customStat",state.customAction.stat)}</div></div><div class="grid2" style="margin-top:8px"><div class="mini"><label class="label">属性变化 1</label><input class="input" type="number" id="customStatAmount" value="${state.customAction.statAmount}"></div><div class="mini"><label class="label">影响属性 2（可选）</label>${selectStat("customStat2",state.customAction.stat2)}</div></div><div class="grid2" style="margin-top:8px"><div class="mini"><label class="label">属性变化 2</label><input class="input" type="number" id="customStatAmount2" value="${state.customAction.statAmount2}"></div><div class="mini"><label class="label">影响技能</label><select id="customSkill"><option value="none">不影响技能</option>${skillOptions}</select></div></div><div class="grid2" style="margin-top:8px"><div class="mini"><label class="label">技能经验</label><input class="input" type="number" id="customSkillAmount" value="${state.customAction.skillAmount}"></div><div class="mini"><label class="label">获得积分</label><input class="input" type="number" id="customPoints" value="${state.customAction.points}"></div></div><br><button class="btn" style="width:100%" data-action="addCustomAction">添加行动</button><div class="actions" style="margin-top:10px">${state.customActions.map((a,i)=>`<div class="action"><b>${a.name}</b><div class="tiny">${statsText(a)} ${a.skill!=="none"?`，${a.skill}技能经验 ${a.skillAmount>=0?"+":""}${a.skillAmount}${a.unit==="hour"?"/小时":""}`:""}，积分 ${a.points>=0?"+":""}${a.points}${a.unit==="hour"?"/小时":""}</div>${a.unit==="hour"?`<input class="input" type="number" data-custom-hours="${i}" placeholder="本次小时数">`:""}<button class="btn" data-run-custom="${i}">完成行动</button></div>`).join("")}</div></div><div class="card"><h2>自定义兑换</h2><div class="grid2"><input class="input" id="rewardName" value="${state.customReward.name}" placeholder="奖励名称"><input class="input" type="number" id="rewardCost" value="${state.customReward.cost}" placeholder="需要积分"></div><br><button class="btn" style="width:100%" data-action="addReward">添加奖励</button></div><div class="card"><h2>自定义页面外观</h2><div class="grid2"><div class="mini"><label class="label">主题颜色</label><input class="input" type="color" id="pageColor" value="${state.pageColor}"></div><div class="mini"><label class="label">颜色代码</label><input class="input" id="pageColorText" value="${state.pageColor}"></div></div><div style="height:12px"></div><div class="mini"><label class="label">背景图片</label><input class="input" type="file" id="bgImageInput" accept="image/*"></div><div style="height:10px"></div><div class="range-row"><div class="row"><span class="label">背景透明度</span><span class="value">${Math.round(Number(state.backgroundOpacity??.25)*100)}%</span></div><input class="input" type="range" id="bgOpacity" min="0" max="1" step="0.01" value="${state.backgroundOpacity??.25}"></div><div style="height:10px"></div><div class="bg-preview"></div><div style="height:10px"></div><button class="btn secondary" style="width:100%" data-action="clearBgImage">清除背景图片</button></div><div class="card"><h2>数据管理</h2><div class="grid3"><button class="btn" data-action="export">导出数据</button><label class="btn" style="text-align:center">导入数据<input type="file" id="importFile" accept=".json,application/json" hidden></label><button class="btn danger" data-action="clear">清空数据</button></div><p class="tiny">数据自动保存在当前浏览器。长期使用建议定期导出备份。</p></div></div>`}
function render(){document.documentElement.style.setProperty("--bg",state.pageColor||DEFAULT_PAGE_COLOR);document.documentElement.style.setProperty("--accent",state.pageColor||DEFAULT_PAGE_COLOR);document.documentElement.style.setProperty("--custom-bg-image",state.backgroundImage?`url(${state.backgroundImage})`:"none");document.documentElement.style.setProperty("--custom-bg-opacity",state.backgroundImage?String(state.backgroundOpacity??"0.25"):"0");document.body.classList.toggle("has-custom-bg",Boolean(state.backgroundImage));const view={dashboard,actions,shop,ledger,custom}[state.tab]();$("#app").innerHTML=`<main class="shell"><section class="hero"><h1>地球online 读博版</h1></section>${view}</main><nav class="tabs"><div class="tabs-inner">${[["dashboard","面板"],["actions","行动"],["shop","兑换"],["ledger","记账"],["custom","自定义"]].map(([id,t])=>`<button class="tab ${state.tab===id?"active":""}" data-tab="${id}">${t}</button>`).join("")}</div></nav>`;bindEvents()}
function bindEvents(){$$('[data-tab]').forEach(b=>b.onclick=()=>setState({tab:b.dataset.tab}));$$('[data-hint-action]').forEach(c=>c.onclick=e=>{if(e.target.closest('button,input,select,label'))return;state.visibleHints={...state.visibleHints,[c.dataset.hintAction]:!state.visibleHints[c.dataset.hintAction]};saveState();render()});$$('[data-action]').forEach(b=>b.onclick=e=>{e.stopPropagation();runAction(b.dataset.action)});$$('[data-redeem]').forEach(b=>b.onclick=()=>redeem(b.dataset.redeem));$$('[data-undo]').forEach(b=>b.onclick=()=>{const i=state.log.find(x=>x.id===b.dataset.undo);if(i&&i.snapshot){restoreSnapshot(i.snapshot);i.undone=true;i.message=`已撤回：${i.message}`;saveState();render()}});$$('[data-undo-ledger]').forEach(b=>b.onclick=()=>{state.ledger=state.ledger.map(i=>i.id===b.dataset.undoLedger?{...i,undone:true}:i);saveState();render()});$$('[data-run-custom]').forEach(b=>b.onclick=()=>runCustomAction(Number(b.dataset.runCustom)));const wi=$("#weightInput");if(wi)wi.oninput=e=>{state.weightInput=e.target.value;saveState()};const sel=$("#selectedSkill");if(sel)sel.onchange=e=>{state.selectedSkill=e.target.value;saveState();render()};const lm=$("#ledgerMonth");if(lm)lm.onchange=e=>{state.ledgerMonth=e.target.value;saveState();render()};const pc=$("#pageColor");if(pc)pc.oninput=e=>{state.pageColor=e.target.value;saveState();render()};const pct=$("#pageColorText");if(pct)pct.onchange=e=>{state.pageColor=e.target.value||DEFAULT_PAGE_COLOR;saveState();render()};const bi=$("#bgImageInput");if(bi)bi.onchange=e=>{const f=e.target.files?.[0];if(!f)return;if(!f.type.startsWith("image/")){alert("请选择图片文件。");return}const r=new FileReader();r.onload=ev=>{state.backgroundImage=ev.target.result;saveState();render()};r.readAsDataURL(f)};const bo=$("#bgOpacity");if(bo)bo.oninput=e=>{state.backgroundOpacity=e.target.value;saveState();render()};const im=$("#importFile");if(im)im.onchange=importData}
function pullInputs(){if($("#readBookMinutes"))state.actionMinutes.readBook=$("#readBookMinutes").value;if($("#learnLanguageMinutes"))state.actionMinutes.learnLanguage=$("#learnLanguageMinutes").value;if($("#learnSkillMinutes"))state.actionMinutes.learnSkill=$("#learnSkillMinutes").value;if($("#ledgerDate"))state.ledgerForm.date=$("#ledgerDate").value;if($("#ledgerName"))state.ledgerForm.name=$("#ledgerName").value;if($("#ledgerAmount"))state.ledgerForm.amount=$("#ledgerAmount").value}
function runAction(a){pullInputs();resetDaily();const snap=snapshot();if(a==="updateWeight"){const nw=round2(toNum(state.weightInput,state.stats.weight));if(nw<=0){addSystemLog("请输入有效的当前体重。");saveState();render();return}const pt=weightPointTotal(nw),pd=round2(pt-state.weightPointsApplied),ht=healthFromWeight(nw),hd=round2(ht-state.weightHealthApplied),wd=round2(nw-state.stats.weight);state.weightPointsApplied=pt;state.weightHealthApplied=ht;if(pd!==0)changePoints(pd,"更新体重");state.stats={...state.stats,weight:nw,health:round2(clamp(state.stats.health+hd,0,100))};recordHistory(state.stats);addLog(`更新体重：${wd<0?`减重 ${Math.abs(wd)} 斤`:wd>0?`增重 ${wd} 斤`:"体重不变"}，健康值 ${hd>=0?"+":""}${hd}，积分 ${pd>=0?"+":""}${pd}。`,snap)}if(a==="readLiterature"){const rg=state.dailyGain.readPaperResearch<.1?.01:0,ag=state.dailyGain.readPaperAmbition<.1?.01:0;if(rg)addSkillExp("科研",rg);if(ag)addStats({ambition:ag});state.dailyGain.readPaperResearch=round2(state.dailyGain.readPaperResearch+rg);state.dailyGain.readPaperAmbition=round2(state.dailyGain.readPaperAmbition+ag);changePoints(1,"读文献");addLog(rg||ag?`读文献：科研经验 +${rg}，进取心 +${ag}，积分 +1。`:"读文献完成：今日科研和进取心加成已达上限，但仍获得 1 积分。",snap)}if(a==="writePaper"){addSkillExp("科研",.01);addStats({ambition:.01});changePoints(1,"写论文");if(!state.paperAccepted){state.paperProgress=clamp(state.paperProgress+1,0,100);if(state.paperProgress>=100){state.paperAccepted=true;addSkillExp("科研",1);addStats({ambition:1})}}addLog(`写论文：进度 ${state.paperProgress}%，科研经验 +0.01，进取心 +0.01，积分 +1。`,snap)}if(a==="readBook"){const m=Math.max(0,toNum(state.actionMinutes.readBook,60)),r=m/60;addStats({knowledge:round2(.01*r)});changePoints(round2(r),"读书");addLog(`读书 ${m} 分钟：知识 +${round2(.01*r)}，积分 +${round2(r)}。`,snap)}if(a==="learnLanguage"){const m=Math.max(0,toNum(state.actionMinutes.learnLanguage,60)),r=m/60;addSkillExp("外语",round2(.01*r));changePoints(round2(r),"学外语");addLog(`学外语 ${m} 分钟：外语技能经验 +${round2(.01*r)}，积分 +${round2(r)}。`,snap)}if(a==="learnSkill"){const m=Math.max(0,toNum(state.actionMinutes.learnSkill,60)),r=m/60;addSkillExp(state.selectedSkill,round2(.01*r));changePoints(round2(r),"学技能");addLog(`学技能 ${m} 分钟：${state.selectedSkill} 技能经验 +${round2(.01*r)}，积分 +${round2(r)}。`,snap)}if(a==="lightWorkout"){addStats({health:.02,ambition:.02});addSkillExp("健身",.02);changePoints(1,"轻度运动");addLog("轻度运动：健康 +0.02，进取心 +0.02，健身技能经验 +0.02，积分 +1。",snap)}if(a==="mediumWorkout"){addStats({health:.05,ambition:.05});addSkillExp("健身",.05);changePoints(1,"中度运动");addLog("中度运动：健康 +0.05，进取心 +0.05，健身技能经验 +0.05，积分 +1。",snap)}if(a==="sing"){addSkillExp("唱歌",.01);changePoints(1,"唱歌");addLog("唱歌：唱歌技能经验 +0.01，积分 +1。",snap)}if(a==="addLedger"){const name=(state.ledgerForm.name||"").trim(),amount=round2(toNum(state.ledgerForm.amount,0)),date=state.ledgerForm.date||todayISO();if(!name||amount<=0)addSystemLog("请输入有效的记账项目和金额。");else{state.ledger=[{id:makeId(),date,name,amount,undone:false},...state.ledger];state.ledgerForm.name="";state.ledgerForm.amount=""}}if(a==="addSkill"){const n=($("#newSkillName")?.value||"").trim();if(n&&!state.skills[n]){state.skills[n]={levelIndex:0,exp:0};state.newSkillName="";addLog(`已添加技能：${n}。`,snap)}}if(a==="addCustomAction"){const stat=$("#customStat")?.value||"none",stat2=$("#customStat2")?.value||"none",statAmount=toNum($("#customStatAmount")?.value),statAmount2=toNum($("#customStatAmount2")?.value),stats=[];if(stat!=="none")stats.push({stat,amount:statAmount});if(stat2!=="none")stats.push({stat:stat2,amount:statAmount2});const x={name:($("#customActionName")?.value||"").trim(),stat,statAmount,stat2,statAmount2,stats,skill:$("#customSkill")?.value||"none",skillAmount:toNum($("#customSkillAmount")?.value),points:toNum($("#customPoints")?.value,1),unit:$("#customUnit")?.value||"time"};state.customAction={...x,statAmount:String(x.statAmount),statAmount2:String(x.statAmount2),skillAmount:String(x.skillAmount),points:String(x.points)};if(x.name){state.customActions.push(x);addLog(`已添加自定义行动：${x.name}。`,snap)}}if(a==="addReward"){const name=($("#rewardName")?.value||"").trim(),cost=Math.max(1,round2(toNum($("#rewardCost")?.value,1)));state.customReward={name,cost:String(cost)};if(name){state.shopItems.push({name,cost});addLog(`已添加兑换奖励：${name}，需要 ${cost} 积分。`,snap)}}if(a==="clearBgImage"){state.backgroundImage="";state.backgroundOpacity="0.25";saveState();render();return}if(a==="export")return exportData();if(a==="clear"){if(confirm("确定要清空所有保存数据吗？这个操作不能撤回。")){localStorage.removeItem(SAVE_KEY);localStorage.removeItem(WEEKLY_KEY);location.reload()}return}saveState();render()}
function redeem(n){const i=state.shopItems.find(x=>x.name===n);if(!i||state.points<i.cost)return;const s=snapshot();changePoints(-i.cost,`兑换：${i.name}`);state.redeemed=[{id:makeId(),name:i.name,cost:i.cost,date:dayText()},...state.redeemed];addLog(`兑换成功：${i.name}，消耗 ${i.cost} 积分。`,s);saveState();render()}function runCustomAction(i){const a=state.customActions[i];if(!a)return;const s=snapshot(),h=$(`[data-custom-hours="${i}"]`)?.value,m=a.unit==="hour"?Math.max(0,toNum(h,1)):1,kd=round2(a.skillAmount*m),pd=round2(a.points*m),stats=customActionStats(a),delta={};stats.forEach(x=>{delta[x.stat]=round2((delta[x.stat]||0)+toNum(x.amount)*m)});if(Object.keys(delta).length)addStats(delta);if(a.skill!=="none")addSkillExp(a.skill,kd);changePoints(pd,a.name);const st=stats.map(x=>`${statLabels[x.stat]} ${toNum(x.amount)*m>=0?"+":""}${round2(toNum(x.amount)*m)}`).join("，");addLog(`${a.name}：${a.unit==="hour"?`${m} 小时，`:""}${st?st+"，":""}积分 ${pd>=0?"+":""}${pd}。`,s);saveState();render()}function exportData(){const blob=new Blob([JSON.stringify({...state,tab:undefined},null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`地球online读博版备份-${todayISO()}.json`;a.click();URL.revokeObjectURL(url)}function importData(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=x=>{try{localStorage.setItem(SAVE_KEY,JSON.stringify(JSON.parse(x.target.result)));location.reload()}catch{alert("导入失败：文件格式不正确。")}};r.readAsText(f)}render();if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(console.error))}
</script>
